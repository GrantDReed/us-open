<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Open 2026 — Fantasy Challenge</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f0e8; color: #1a1a1a; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const TEAMS = [
  { id: 0, name: "Adam Rowden", players: [] },
  { id: 1, name: "Dave Gregory", players: [] },
  { id: 2, name: "Tom Seymour", players: [] },
  { id: 3, name: "Ludo Webb", players: [] },
  { id: 4, name: "Louis Browne", players: [] },
  { id: 5, name: "Will Emerson", players: [] },
  { id: 6, name: "Darren Teague", players: [] },
  { id: 7, name: "Dan Harris", players: [] },
  { id: 8, name: "Dave Hudson", players: [] },
  { id: 9, name: "Grant Reed", players: [] },
];

const NPC_TEAMS = [];

const TRANSFERS = [];

const POLL_MS = 3 * 60 * 1000;
const costBg = { 4: "#b91c1c", 3: "#1d4ed8", 2: "#15803d", 1: "#7e22ce" };

function normalize(n) {
  return n.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z ]/g,"").trim();
}

const PRICE_TIERS = {
  4: [],
  3: [],
  2: [],
  1: [],
};
const PRICES = (() => {
  const m = {};
  for (const [tier, names] of Object.entries(PRICE_TIERS)) {
    for (const n of names) m[normalize(n)] = parseInt(tier);
  }
  return m;
})();
function nameMatches(a, b) {
  const na = normalize(a), nb = normalize(b);
  if (na === nb) return true;
  const la = na.split(" ").pop(), lb = nb.split(" ").pop();
  return la === lb && na[0] === nb[0];
}
function getTier(apiName) {
  const n = normalize(apiName);
  if (PRICES[n] != null) return PRICES[n];
  const last = n.split(" ").pop();
  for (const k of Object.keys(PRICES)) {
    const kl = k.split(" ").pop();
    if (kl === last && k[0] === n[0]) return PRICES[k];
  }
  return null;
}
function teamsOwning(apiName) {
  const out = [];
  for (const t of TEAMS) {
    if (t.players.some(p => nameMatches(p.name, apiName))) out.push(t.name);
  }
  return out;
}

function App() {
  const [players, setPlayers] = useState({});
  const [expandedId, setExpandedId] = useState(null);
  const [expandedPlayer, setExpandedPlayer] = useState(null);
  const [status, setStatus] = useState("idle");
  const [lastUpdated, setLastUpdated] = useState(null);
  const [msg, setMsg] = useState("");
  const [autoPoll, setAutoPoll] = useState(true);
  const [rulesOpen, setRulesOpen] = useState(false);
  const [view, setView] = useState("leaderboard");
  const [isMobile, setIsMobile] = useState(window.innerWidth < 480);
  useEffect(() => {
    const mq = window.matchMedia("(max-width: 479px)");
    const h = (e) => setIsMobile(e.matches);
    mq.addEventListener("change", h);
    return () => mq.removeEventListener("change", h);
  }, []);
  const intervalRef = useRef(null);

  const findScore = useCallback((ourName) => {
    if (players[ourName]) return players[ourName];
    const norm = normalize(ourName);
    for (const [k, v] of Object.entries(players)) {
      if (normalize(k) === norm) return v;
      // Last name match
      const kLast = normalize(k).split(" ").pop();
      const ourLast = norm.split(" ").pop();
      if (kLast === ourLast && normalize(k)[0] === norm[0]) return v;
    }
    return null;
  }, [players]);

  const doFetch = useCallback(async () => {
    setStatus("fetching");
    try {
      const res = await fetch("/api/scores");
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error + ": " + (data.details||[]).join(", "));
      const map = {};
      for (const p of data.players) { map[p.name] = p; }
      setPlayers(map);
      setLastUpdated(new Date());
      setStatus("success");
      setMsg(`${data.playerCount} players via ${data.source}`);
    } catch (e) {
      setStatus("error");
      setMsg(e.message);
    }
  }, []);

  useEffect(() => {
    if (autoPoll) {
      doFetch();
      intervalRef.current = setInterval(doFetch, POLL_MS);
      return () => clearInterval(intervalRef.current);
    } else {
      if (intervalRef.current) clearInterval(intervalRef.current);
    }
  }, [autoPoll, doFetch]);

  const gTot = (name) => findScore(name)?.total ?? null;
  const gThru = (name) => findScore(name)?.thru ?? null;

  // Derive corrected round scores — if total != sum of rounds, fix the latest round
  const correctedRounds = (s) => {
    if (!s) return { r1: null, r2: null, r3: null, r4: null };
    const rounds = { r1: s.r1, r2: s.r2, r3: s.r3, r4: s.r4 };
    if (s.total == null) return rounds;
    const keys = ["r1", "r2", "r3", "r4"];
    const nonNull = keys.filter(k => rounds[k] != null);
    if (nonNull.length === 0) return rounds;
    const sum = nonNull.reduce((a, k) => a + rounds[k], 0);
    if (sum !== s.total) {
      // Fix the latest round with data
      const lastKey = nonNull[nonNull.length - 1];
      rounds[lastKey] = s.total - (sum - rounds[lastKey]);
    }
    return rounds;
  };

  // Cut line: top 60 and ties
  const allPlayers = Object.values(players);
  // R2 is over when every player has r2 data AND no one is still mid-round in R2
  const r2Done = allPlayers.length > 0 && allPlayers.every(p => p.r2 != null) && allPlayers.every(p => {
    if (p.r3 != null) return true; // already in R3, clearly past R2
    const t = parseInt(p.thru);
    return isNaN(t) || t >= 18; // not mid-round
  });
  // Cut is a 36-hole cut — always compute from R1+R2 only, never from live total
  const r1r2Score = (p) => (p.r1 != null && p.r2 != null) ? p.r1 + p.r2 : null;
  const playersWithR1R2 = allPlayers.filter(p => r1r2Score(p) != null).sort((a, b) => r1r2Score(a) - r1r2Score(b));
  const projectedCutScore = playersWithR1R2.length >= 60 ? r1r2Score(playersWithR1R2[59]) : null;
  const actualCutScore = r2Done ? projectedCutScore : null;
  // MC penalty only applies after R2 is complete
  const isMC = (name) => {
    if (actualCutScore === null) return false;
    const s = findScore(name);
    if (!s) return false;
    const sc36 = r1r2Score(s);
    if (sc36 == null) return false;
    return sc36 > actualCutScore;
  };

  // Worst round score among all active players (for missed-cut penalty)
  const worstRound = (rKey) => {
    let worst = null;
    for (const p of Object.values(players)) {
      const v = p[rKey];
      if (v != null && (worst === null || v > worst)) worst = v;
    }
    return worst;
  };

  // Build effective roster with roles
  const buildRoster = (team) => {
    const tx = TRANSFERS.find(t => t.teamId === team.id);
    return team.players.map(p => {
      if (tx && nameMatches(p.name, tx.out)) return { ...p, role: "swapped-out" };
      if (isMC(p.name) && !tx?.out) return { ...p, role: "mc" };
      if (tx && isMC(p.name) && !nameMatches(p.name, tx.out)) return { ...p, role: "mc" };
      return { ...p, role: "original" };
    }).concat(tx ? [{ name: tx.in, cost: tx.inCost, role: "swapped-in" }] : []);
  };

  // Player's scoring contribution based on role
  const playerContribution = (name, role) => {
    const s = findScore(name);
    if (!s) return null;
    if (role === "original") return s.total ?? null;
    if (role === "swapped-out") {
      const r1 = s.r1, r2 = s.r2;
      if (r1 == null && r2 == null) return null;
      return (r1 ?? 0) + (r2 ?? 0);
    }
    if (role === "swapped-in") {
      const r3 = s.r3, r4 = s.r4;
      if (r3 == null && r4 == null) return null;
      return (r3 ?? 0) + (r4 ?? 0);
    }
    if (role === "mc") {
      const r1 = s.r1, r2 = s.r2;
      const base = (r1 == null && r2 == null) ? null : (r1 ?? 0) + (r2 ?? 0);
      const wr3 = worstRound("r3"), wr4 = worstRound("r4");
      const penalty = (wr3 ?? 0) + (wr4 ?? 0);
      if (base == null && wr3 == null && wr4 == null) return null;
      return (base ?? 0) + penalty;
    }
    return s.total ?? null;
  };

  // Team total using effective roster
  const tTot = (team) => {
    const roster = team.players[0]?.role ? team.players : buildRoster(team);
    let t = 0, h = false;
    for (const p of roster) {
      const c = playerContribution(p.name, p.role || "original");
      if (c !== null) { t += c; h = true; }
    }
    return h ? t : null;
  };

  const sortedPlayerScores = (team) => {
    const roster = team.players[0]?.role ? team.players : buildRoster(team);
    return roster.filter(p => p.role !== "swapped-out").map(p => playerContribution(p.name, p.role || "original") ?? Infinity).sort((a, b) => a - b);
  };

  const ranked = [...TEAMS].map(t => {
    const roster = buildRoster(t);
    return { ...t, roster, players: roster, total: null };
  }).map(t => ({ ...t, total: tTot(t) })).sort((a, b) => {
    if (a.total === null && b.total === null) return a.id - b.id;
    if (a.total === null) return 1; if (b.total === null) return -1;
    if (a.total !== b.total) return a.total - b.total;
    const as = sortedPlayerScores(a), bs = sortedPlayerScores(b);
    for (let i = 0; i < as.length; i++) { if (as[i] !== bs[i]) return as[i] - bs[i]; }
    return a.id - b.id;
  });

  const fmt=(n)=>{if(n===null||n===undefined)return"–";if(n===0)return"E";return n>0?`+${n}`:`${n}`;};
  const sc=(n)=>{if(n===null)return"#999";if(n<0)return"#c0392b";if(n===0)return"#555";return"#2c3e50";};
  const lv = ranked[0]?.total;
  const lastVal = [...ranked].reverse().find(t=>t.total!==null)?.total;

  const rankedNpc = [...NPC_TEAMS].map(t=>{
    const roster = buildRoster(t);
    return { ...t, roster, players: roster, total: null };
  }).map(t=>({...t,total:tTot(t)})).sort((a,b)=>{
    if(a.total===null&&b.total===null) return 0;
    if(a.total===null) return 1; if(b.total===null) return -1;
    if(a.total!==b.total) return a.total-b.total;
    const as=sortedPlayerScores(a), bs=sortedPlayerScores(b);
    for(let i=0;i<as.length;i++){ if(as[i]!==bs[i]) return as[i]-bs[i]; }
    return 0;
  });

  const fieldPlayers = Object.values(players).map(p=>({
    ...p,
    tier: getTier(p.name),
    owners: teamsOwning(p.name),
    cut: projectedCutScore !== null && r1r2Score(p) != null && r1r2Score(p) > projectedCutScore,
  })).sort((a,b)=>{
    if(a.cut!==b.cut) return a.cut?1:-1;
    if(a.total===null&&b.total===null) return a.name.localeCompare(b.name);
    if(a.total===null) return 1;
    if(b.total===null) return -1;
    return a.total-b.total;
  });
  const cutIndex = fieldPlayers.findIndex(p=>p.cut);

  return (
    <div>
      <header style={{background:"linear-gradient(135deg,#00205b 0%,#003087 40%,#00205b 100%)",color:"#fff",textAlign:"center",paddingTop:32}}>
        <div style={{paddingBottom:22}}>
          <div style={{fontSize:13,letterSpacing:8,opacity:.6,fontFamily:"'Playfair Display',serif"}}>2026</div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(22px,4.5vw,38px)",fontWeight:900,letterSpacing:3,margin:"2px 0",lineHeight:1.1,textShadow:"0 2px 10px rgba(0,0,0,.3)"}}>US OPEN</h1>
          <div style={{fontSize:12,letterSpacing:6,fontWeight:600,opacity:.85,background:"rgba(255,255,255,.12)",display:"inline-block",padding:"3px 14px",borderRadius:2,marginTop:4}}>FANTASY CHALLENGE</div>
          <div style={{marginTop:10,fontSize:10,letterSpacing:3,opacity:.5}}>SHINNECOCK HILLS &nbsp;◆&nbsp; JUNE 18–21 &nbsp;◆&nbsp; 10 TEAMS &nbsp;◆&nbsp; £10M BUDGET</div>
        </div>
        <div style={{height:4,background:"linear-gradient(90deg,#cc0000,#ff4444,#cc0000,#ff4444,#cc0000)"}}/>
      </header>

      <div style={{maxWidth:860,margin:"0 auto",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:12,color:"#777"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:status==="fetching"?"#f59e0b":status==="error"?"#ef4444":autoPoll?"#22c55e":"#999",animation:status==="fetching"?"pulse 1s infinite":"none"}}/>
            {status==="fetching"?"Fetching…":status==="error"?"Error":autoPoll?"Live · every 3 min":"Paused"}
          </div>
          {lastUpdated && <span style={{opacity:.7}}>Updated {lastUpdated.toLocaleTimeString()}</span>}
          {msg && <span style={{fontSize:11,color:status==="error"?"#c0392b":"#888"}}>{msg}</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setAutoPoll(!autoPoll)} style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,padding:"6px 12px",border:"1px solid #ccc",borderRadius:6,cursor:"pointer",background:autoPoll?"#00205b":"#fff",color:autoPoll?"#fff":"#555"}}>{autoPoll?"⏸ Pause":"▶ Live"}</button>
          <button onClick={doFetch} disabled={status==="fetching"} style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,padding:"6px 12px",border:"2px solid #00205b",borderRadius:6,cursor:"pointer",background:"#fff",color:"#00205b",opacity:status==="fetching"?.5:1}}>🏌️ Refresh</button>
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"0 16px 16px"}}>
        <button onClick={()=>setRulesOpen(!rulesOpen)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:rulesOpen?"#00205b":"#fff",color:rulesOpen?"#cc0000":"#00205b",border:"1px solid #00205b",borderRadius:6,cursor:"pointer",fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,letterSpacing:2}}>
          <span>RULES</span>
          <span style={{fontSize:12}}>{rulesOpen?"▲":"▼"}</span>
        </button>
        {rulesOpen && (
          <div style={{marginTop:8,padding:"18px 20px",background:"#fff",border:"1px solid #e8e4da",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:13,lineHeight:1.6,color:"#333"}}>
            <ol style={{margin:0,paddingLeft:20}}>
              <li style={{marginBottom:10}}><strong>Budget:</strong> Each player has a £10m budget to pick 4 golfers.</li>
              <li style={{marginBottom:10}}><strong>Value tiers:</strong> Golfers cost £4m, £3m, £2m, or £1m.</li>
              <li style={{marginBottom:10}}><strong>Squad limits:</strong> Max one £4m player and max two £3m players per team.</li>
              <li style={{marginBottom:10}}><strong>Scoring:</strong> Each round, every golfer's score relative to par is summed for the team total. <em>Lowest total wins.</em></li>
              <li style={{marginBottom:10}}><strong>Free transfer before Round 3:</strong> After Round 2, each team may make ONE transfer — swap any player (whether or not they made the cut) for another player of the same or lower value who is still in the tournament. You keep the swapped-out player's R1/R2 scores; the new player only contributes their R3/R4 scores.</li>
              <li style={{marginBottom:10}}><strong>Missed cut penalty:</strong> If after the free transfer a team still has any player(s) who missed the cut, those players are assigned the <em>worst score of the round</em> (i.e. the highest round score shot by any player still playing) for Rounds 3 and 4.</li>
              <li><strong>Tiebreaker:</strong> If two or more teams finish level on total score, the team whose <em>single best player</em> shot the lower score wins. If those are still level, compare the next-best player, and so on.</li>
            </ol>
          </div>
        )}
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"0 16px",display:"flex",gap:0,borderBottom:"2px solid #e8e4da"}}>
        {[["leaderboard","Leaderboard"],["npc","NPC Teams"]].map(([k,label])=>{
          const active=view===k;
          return (
            <button key={k} onClick={()=>setView(k)} style={{flex:1,padding:"10px 14px",background:"transparent",border:"none",borderBottom:active?"3px solid #cc0000":"3px solid transparent",marginBottom:-2,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:active?800:600,letterSpacing:2,color:active?"#00205b":"#999"}}>
              {label.toUpperCase()}
            </button>
          );
        })}
      </div>

      {view==="leaderboard" && (
      <section style={{maxWidth:860,margin:"0 auto",padding:"16px 16px 24px"}}>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {ranked.map((team,idx)=>{
            const pos=idx+1,isLeader=team.total!==null&&team.total===lv,isLast=!isLeader&&team.total!==null&&team.total===lastVal,open=expandedId===team.id;
            return(
              <div key={team.id} onClick={()=>setExpandedId(open?null:team.id)} style={{background:"#fff",borderRadius:10,overflow:"hidden",cursor:"pointer",boxShadow:isLeader?"0 3px 20px rgba(201,168,76,.3)":"0 1px 8px rgba(0,0,0,.06)",border:isLeader?"2px solid #cc0000":"1px solid #e8e4da"}}>
                <div style={{display:"grid",gridTemplateColumns:"44px 1fr auto",alignItems:"center",padding:"14px 16px",gap:12,background:isLeader?"linear-gradient(90deg,#fdf8e8,#fff9e0)":"transparent"}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:isLeader?"transparent":"#f0ece2",color:"#555",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:isLeader||isLast?22:16}}>{isLeader?"🍆":isLast?"💩":pos}</div>
                  <div>
                    <div style={{fontSize:16,fontWeight:700,color:"#00205b"}}>{team.name}</div>
                    <div style={{display:"flex",flexDirection:isMobile?"column":"row",gap:isMobile?4:6,flexWrap:"wrap",marginTop:4}}>
                      {team.players.map((p,i)=>{
                        const thru=gThru(p.name);

                        const isOut=p.role==="swapped-out", isIn=p.role==="swapped-in", isMc=p.role==="mc";
                        const contrib=playerContribution(p.name, p.role||"original");
                        return(
                          <span key={i} style={{fontSize:11,background:isOut?"#ddd":"#f0ece2",padding:"2px 8px",borderRadius:12,display:"inline-flex",alignItems:"center",gap:4,alignSelf:"flex-start",opacity:isOut?.55:1}}>
                            <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:16,height:16,borderRadius:"50%",background:costBg[p.cost],color:"#fff",fontSize:9,fontWeight:700}}>{p.cost}</span>
                            <span style={{textDecoration:isOut?"line-through":"none"}}>{p.name}</span>
                                                        {isIn&&<span style={{fontSize:9,fontWeight:700,color:"#15803d",marginLeft:2}}>↑IN</span>}
                            {isMc&&<span style={{fontSize:9,fontWeight:700,color:"#dc2626",marginLeft:2}}>MC</span>}
                            <span style={{fontWeight:700,color:sc(contrib),fontSize:10}}>{fmt(contrib)}</span>
                            {!isOut&&thru&&<span style={{fontSize:9,color:"#999"}}>({thru==="18"||thru==="F"?"F":thru})</span>}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                  <div style={{fontSize:24,fontWeight:800,color:sc(team.total),fontVariantNumeric:"tabular-nums"}}>{fmt(team.total)}</div>
                </div>
                {open&&(
                  <div style={{borderTop:"1px solid #eee",background:"#fafaf5",overflowX:"auto"}} onClick={e=>e.stopPropagation()}>
                   <div style={{padding:"12px 16px",minWidth:440}}>
                    <div style={{display:"grid",gridTemplateColumns:"minmax(140px,1fr) repeat(4,42px) 48px 48px",gap:4,fontSize:10,fontWeight:700,color:"#888",letterSpacing:1,marginBottom:6,paddingLeft:28}}>
                      <span/>{[1,2,3,4].map(r=><span key={r} style={{textAlign:"center"}}>R{r}</span>)}<span style={{textAlign:"center"}}>TOT</span><span style={{textAlign:"center"}}>THRU</span>
                    </div>
                    {team.players.map((p,i)=>{
                      const s=findScore(p.name)||{};const cr=correctedRounds(findScore(p.name));const thru=gThru(p.name);
                      const wheelchair=team.id===4&&p.name==="Fred Couples";
                      const isOut=p.role==="swapped-out", isIn=p.role==="swapped-in", isMc=p.role==="mc";
                      const contrib=playerContribution(p.name, p.role||"original");
                      const showDivider=isIn;
                      return(
                        <React.Fragment key={i}>
                        {showDivider&&<div style={{gridColumn:"1/-1",borderTop:"2px dashed #cc0000",margin:"4px 0 2px 28px"}}/>}
                        <div style={{display:"grid",gridTemplateColumns:"minmax(140px,1fr) repeat(4,42px) 48px 48px",gap:4,alignItems:"center",padding:"6px 0 6px 28px",borderBottom:!isIn&&i<team.players.length-1?"1px solid #eee":"none"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:20,height:20,borderRadius:"50%",background:costBg[p.cost],color:"#fff",fontSize:10,fontWeight:700,opacity:isOut?.5:1}}>{p.cost}</span>
                            <div>
                              <span style={{fontSize:13,fontWeight:600,textDecoration:isOut?"line-through":"none",opacity:isOut?.5:1}}>{p.name}{wheelchair&&<span style={{fontSize:"1.4em",marginLeft:3,verticalAlign:"middle"}}>🪦 RIP</span>}</span>
                              {isIn&&<span style={{fontSize:9,fontWeight:700,color:"#15803d",marginLeft:4}}>↑IN</span>}
                              {isMc&&<span style={{fontSize:9,fontWeight:700,color:"#dc2626",marginLeft:4}}>MC</span>}
                              {isMc&&<div style={{fontSize:10,color:"#ea580c",fontStyle:"italic",marginTop:1}}>R3/R4 = worst active round score</div>}
                            </div>
                          </div>
                          {["r1","r2","r3","r4"].map(r=>{
                            const grayOut=(isOut&&(r==="r3"||r==="r4"))||(isIn&&(r==="r1"||r==="r2"));
                            const isPenalty=isMc&&(r==="r3"||r==="r4");
                            const v=isPenalty?worstRound(r):(grayOut?null:cr[r]);
                            return<span key={r} style={{textAlign:"center",fontSize:13,fontWeight:600,color:grayOut?"#ccc":isPenalty?"#ea580c":sc(v??null),fontStyle:isPenalty?"italic":"normal"}}>{grayOut?"✕":fmt(v??null)}</span>;
                          })}
                          <span style={{textAlign:"center",fontSize:14,fontWeight:800,color:sc(contrib)}}>{fmt(contrib)}</span>
                          <span style={{textAlign:"center",fontSize:12,color:"#888"}}>{isOut?"":thru||"–"}</span>
                        </div>
                        </React.Fragment>
                      );
                    })}
                   </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </section>
      )}

      {view==="players" && (
      <section style={{maxWidth:860,margin:"0 auto",padding:"16px 16px 24px"}}>
        {fieldPlayers.length===0 ? (
          <div style={{textAlign:"center",padding:"40px 16px",color:"#999",fontSize:13}}>Loading field…</div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {fieldPlayers.map((p,i)=>{
              const open=expandedPlayer===p.name;
              const showCutLine=cutIndex>0&&i===cutIndex;
              return(
              <React.Fragment key={i}>
              {showCutLine&&(
                <div style={{display:"flex",alignItems:"center",gap:10,margin:"6px 0"}}>
                  <div style={{flex:1,height:2,background:"#dc2626"}}/>
                  <span style={{fontSize:11,fontWeight:700,color:"#dc2626",letterSpacing:2,whiteSpace:"nowrap"}}>✂ {r2Done?"CUT LINE":"PROJECTED CUT"} {projectedCutScore!==null&&`(${fmt(projectedCutScore)})`}</span>
                  <div style={{flex:1,height:2,background:"#dc2626"}}/>
                </div>
              )}
              <div onClick={()=>setExpandedPlayer(open?null:p.name)} style={{background:"#fff",borderRadius:8,border:(p.cut&&r2Done)?"1px solid #e8d4d4":"1px solid #e8e4da",cursor:"pointer",overflow:"hidden",opacity:(p.cut&&r2Done)?.6:1}}>
                <div style={{padding:"10px 14px",display:"grid",gridTemplateColumns:"28px 1fr auto",gap:10,alignItems:"center"}}>
                  <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:24,height:24,borderRadius:"50%",background:p.tier?costBg[p.tier]:"#ccc",color:"#fff",fontSize:11,fontWeight:700}}>{p.tier??"?"}</span>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:(p.cut&&r2Done)?"#999":"#00205b"}}>{p.name}{p.cut&&r2Done&&<span style={{fontSize:10,fontWeight:700,color:"#dc2626",marginLeft:6}}>MC</span>}</div>
                    {p.owners.length>0 && (
                      <div style={{fontSize:11,color:"#888",marginTop:2}}>owned by {p.owners.map(o=>o.split(" ").pop()).join(" · ")}</div>
                    )}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:16,fontWeight:800,color:sc(p.total),fontVariantNumeric:"tabular-nums"}}>{fmt(p.total)}</div>
                    {p.thru && <div style={{fontSize:10,color:"#999",marginTop:1}}>{p.thru==="18"||p.thru==="F"?"F":`thru ${p.thru}`}</div>}
                  </div>
                </div>
                {open && (
                  <div style={{borderTop:"1px solid #eee",background:"#fafaf5",padding:"10px 14px",display:"grid",gridTemplateColumns:"repeat(4,1fr) 56px",gap:6}} onClick={e=>e.stopPropagation()}>
                    {[1,2,3,4].map(r=>{
                      const cr=correctedRounds(p);const v=cr["r"+r];
                      return(
                        <div key={r} style={{textAlign:"center"}}>
                          <div style={{fontSize:9,fontWeight:700,color:"#888",letterSpacing:1}}>R{r}</div>
                          <div style={{fontSize:15,fontWeight:700,color:sc(v??null),fontVariantNumeric:"tabular-nums"}}>{fmt(v??null)}</div>
                        </div>
                      );
                    })}
                    <div style={{textAlign:"center",borderLeft:"1px solid #e8e4da"}}>
                      <div style={{fontSize:9,fontWeight:700,color:"#888",letterSpacing:1}}>POS</div>
                      <div style={{fontSize:13,fontWeight:700,color:"#555"}}>{p.pos||"–"}</div>
                    </div>
                  </div>
                )}
              </div>
              </React.Fragment>
              );
            })}
          </div>
        )}
      </section>
      )}

      {view==="npc" && (
      <section style={{maxWidth:860,margin:"0 auto",padding:"16px 16px 24px"}}>
        <div style={{fontSize:12,color:"#777",marginBottom:10,lineHeight:1.5}}>
          NPC benchmark teams — coming soon.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {rankedNpc.map((team,idx)=>{
            const open=expandedId===team.id;
            return(
              <div key={team.id} onClick={()=>setExpandedId(open?null:team.id)} style={{background:"#fff",borderRadius:10,overflow:"hidden",cursor:"pointer",boxShadow:"0 1px 8px rgba(0,0,0,.06)",border:"1px dashed #8b7355"}}>
                <div style={{display:"grid",gridTemplateColumns:"44px 1fr auto",alignItems:"center",padding:"14px 16px",gap:12}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:"#f0ece2",color:"#555",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16}}>{idx+1}</div>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:"#00205b"}}>
                      {team.strategy} <span style={{fontSize:11,color:"#8b7355",fontWeight:600,letterSpacing:1,marginLeft:4}}>· {team.combo}</span>
                    </div>
                    <div style={{display:"flex",flexDirection:isMobile?"column":"row",gap:isMobile?4:6,flexWrap:"wrap",marginTop:4}}>
                      {team.players.map((p,i)=>{
                        const thru=gThru(p.name);
                        const isOut=p.role==="swapped-out", isIn=p.role==="swapped-in", isMc=p.role==="mc";
                        const contrib=playerContribution(p.name, p.role||"original");
                        return(
                          <span key={i} style={{fontSize:11,background:isOut?"#ddd":"#f0ece2",padding:"2px 8px",borderRadius:12,display:"inline-flex",alignItems:"center",gap:4,alignSelf:"flex-start",opacity:isOut?.55:1}}>
                            <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:16,height:16,borderRadius:"50%",background:costBg[p.cost],color:"#fff",fontSize:9,fontWeight:700}}>{p.cost}</span>
                            <span style={{textDecoration:isOut?"line-through":"none"}}>{p.name}</span>
                            {isIn&&<span style={{fontSize:9,fontWeight:700,color:"#15803d",marginLeft:2}}>↑IN</span>}
                            {isMc&&<span style={{fontSize:9,fontWeight:700,color:"#dc2626",marginLeft:2}}>MC</span>}
                            <span style={{fontWeight:700,color:sc(contrib),fontSize:10}}>{fmt(contrib)}</span>
                            {!isOut&&thru&&<span style={{fontSize:9,color:"#999"}}>({thru==="18"||thru==="F"?"F":thru})</span>}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                  <div style={{fontSize:24,fontWeight:800,color:sc(team.total),fontVariantNumeric:"tabular-nums"}}>{fmt(team.total)}</div>
                </div>
                {open&&(
                  <div style={{borderTop:"1px solid #eee",background:"#fafaf5",overflowX:"auto"}} onClick={e=>e.stopPropagation()}>
                   <div style={{padding:"12px 16px",minWidth:480}}>
                    <div style={{display:"grid",gridTemplateColumns:"minmax(140px,1fr) 44px repeat(4,42px) 48px 48px",gap:4,fontSize:10,fontWeight:700,color:"#888",letterSpacing:1,marginBottom:6,paddingLeft:28}}>
                      <span/><span style={{textAlign:"center"}}>{team.detailLabel}</span>{[1,2,3,4].map(r=><span key={r} style={{textAlign:"center"}}>R{r}</span>)}<span style={{textAlign:"center"}}>TOT</span><span style={{textAlign:"center"}}>THRU</span>
                    </div>
                    {team.players.map((p,i)=>{
                      const s=findScore(p.name)||{};const cr=correctedRounds(findScore(p.name));const thru=gThru(p.name);
                      const isOut=p.role==="swapped-out", isIn=p.role==="swapped-in", isMc=p.role==="mc";
                      const contrib=playerContribution(p.name, p.role||"original");
                      const showDivider=isIn;
                      return(
                        <React.Fragment key={i}>
                        {showDivider&&<div style={{gridColumn:"1/-1",borderTop:"2px dashed #cc0000",margin:"4px 0 2px 28px"}}/>}
                        <div style={{display:"grid",gridTemplateColumns:"minmax(140px,1fr) 44px repeat(4,42px) 48px 48px",gap:4,alignItems:"center",padding:"6px 0 6px 28px",borderBottom:!isIn&&i<team.players.length-1?"1px solid #eee":"none"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:20,height:20,borderRadius:"50%",background:costBg[p.cost],color:"#fff",fontSize:10,fontWeight:700,opacity:isOut?.5:1}}>{p.cost}</span>
                            <div>
                              <span style={{fontSize:13,fontWeight:600,textDecoration:isOut?"line-through":"none",opacity:isOut?.5:1}}>{p.name}</span>
                              {isIn&&<span style={{fontSize:9,fontWeight:700,color:"#15803d",marginLeft:4}}>↑IN</span>}
                              {isMc&&<span style={{fontSize:9,fontWeight:700,color:"#dc2626",marginLeft:4}}>MC</span>}
                              {isMc&&<div style={{fontSize:10,color:"#ea580c",fontStyle:"italic",marginTop:1}}>R3/R4 = worst active round score</div>}
                            </div>
                          </div>
                          <span style={{textAlign:"center",fontSize:12,fontWeight:700,color:"#8b7355"}}>{p.detail||""}</span>
                          {["r1","r2","r3","r4"].map(r=>{
                            const grayOut=(isOut&&(r==="r3"||r==="r4"))||(isIn&&(r==="r1"||r==="r2"));
                            const isPenalty=isMc&&(r==="r3"||r==="r4");
                            const v=isPenalty?worstRound(r):(grayOut?null:cr[r]);
                            return<span key={r} style={{textAlign:"center",fontSize:13,fontWeight:600,color:grayOut?"#ccc":isPenalty?"#ea580c":sc(v??null),fontStyle:isPenalty?"italic":"normal"}}>{grayOut?"✕":fmt(v??null)}</span>;
                          })}
                          <span style={{textAlign:"center",fontSize:14,fontWeight:800,color:sc(contrib)}}>{fmt(contrib)}</span>
                          <span style={{textAlign:"center",fontSize:12,color:"#888"}}>{isOut?"":thru||"–"}</span>
                        </div>
                        </React.Fragment>
                      );
                    })}
                   </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </section>
      )}

      <footer style={{textAlign:"center",padding:"20px 16px 28px",fontSize:11,color:"#bbb",letterSpacing:2,fontStyle:"italic"}}>A tradition unlike any other™</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
