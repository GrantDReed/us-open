// "swap" = one-swap transfer. US Open 2026 \u2014 Shinnecock Hills, June 18\u201321.
// Tee times are placeholders until the official R1/R3 schedule is published.
const EDIT_WINDOWS = [
  { open: new Date("2026-01-01T00:00:00-05:00"), close: new Date("2026-06-18T06:45:00-04:00"), label: "Team picks", mode: "build" },

// Order roster chips: highest tier first, swapped-in player last.
function rosterDisplayOrder(players) {
  return [...players].sort((a, b) => {
    const aIn = a.role === "swapped-in" ? 1 : 0, bIn = b.role === "swapped-in" ? 1 : 0;
    if (aIn !== bIn) return aIn - bIn;
    return (b.cost || 0) - (a.cost || 0);
  });
}
function editingStatus() {
  const now = new Date();
  for (const w of EDIT_WINDOWS) {
    if (now >= w.open && now < w.close) return { allowed: true, label: w.label, mode: w.mode };
  }
  // Find next window
  const next = EDIT_WINDOWS.find(w => now < w.open);
  if (next) return { allowed: false, label: `Locked until ${next.label.toLowerCase()}`, mode: null };
  return { allowed: false, label: "Editing closed", mode: null };
}

function normalize(n) {
  // Map atomic non-ASCII letters that NFD won't decompose (\u00f8, \u00e6, \u0142, \u0111, \u00df, \u00f0).
  const mapped = n
    .replace(/\u00f8/g,"o").replace(/\u00d8/g,"O")
    .replace(/\u00e6/g,"ae").replace(/\u00c6/g,"AE")
    .replace(/\u0142/g,"l").replace(/\u0141/g,"L")
    .replace(/\u0111/g,"d").replace(/\u0110/g,"D")
    .replace(/\u00f0/g,"d").replace(/\u00d0/g,"D")
    .replace(/\u00df/g,"ss");
  return mapped.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z ]/g,"").trim();
}

const PRICES = (() => {
  const m = {};
  for (const [tier, names] of Object.entries(PRICE_TIERS)) {
    for (const n of names) m[normalize(n)] = parseInt(tier);
  }
  return m;
})();
function nameMatches(a, b) {
  const na = normalize(a), nb = normalize(b);
  if (na === nb) return true;
  const la = na.split(" ").pop(), lb = nb.split(" ").pop();
  return la === lb && na[0] === nb[0];
}
function getTier(apiName) {
  const n = normalize(apiName);
  if (PRICES[n] != null) return PRICES[n];
  const last = n.split(" ").pop();
  for (const k of Object.keys(PRICES)) {
    const kl = k.split(" ").pop();
    if (kl === last && k[0] === n[0]) return PRICES[k];
  }
  return null;
}
// teamsOwning is defined inside App() so it can use dynamic rosters

function App() {
  const [players, setPlayers] = useState({});
  const [expandedId, setExpandedId] = useState(null);
  const [expandedPlayer, setExpandedPlayer] = useState(null);
  const [status, setStatus] = useState("idle");
  const [lastUpdated, setLastUpdated] = useState(null);
  const [msg, setMsg] = useState("");
  const [autoPoll, setAutoPoll] = useState(true);
  const [rulesOpen, setRulesOpen] = useState(false);
  const [tierMethodOpen, setTierMethodOpen] = useState(false);
  const [view, setView] = useState("leaderboard");
  const [isMobile, setIsMobile] = useState(window.innerWidth < 480);
  // Team picker state
  const [teamRosters, setTeamRosters] = useState({});
  const [apiTransfers, setApiTransfers] = useState({});
  const [takenNames, setTakenNames] = useState([]); // normalized names already drafted by some team
  const [pickOpen, setPickOpen] = useState(false);
  const [pickStep, setPickStep] = useState("pin"); // pin | edit
  const [pickTeamId, setPickTeamId] = useState(null);
  const [pickPin, setPickPin] = useState("");
  const [pickPlayers, setPickPlayers] = useState([]);
  const [pickOriginalRoster, setPickOriginalRoster] = useState([]); // canonical roster for swap-mode diff display
  const [pickPendingTransfer, setPickPendingTransfer] = useState(null);
  const [pickError, setPickError] = useState("");
  const [pickSaving, setPickSaving] = useState(false);
  useEffect(() => {
    const mq = window.matchMedia("(max-width: 479px)");
    const h = (e) => setIsMobile(e.matches);
    mq.addEventListener("change", h);
    return () => mq.removeEventListener("change", h);
  }, []);
  const intervalRef = useRef(null);

  // Load rosters + transfers from Redis (transfers are redacted server-side
  // until the swap window has closed at first R3 tee time)
  const fetchRosters = useCallback(async () => {
    try {
      const res = await fetch("/api/teams");
      if (res.ok) {
        const data = await res.json();
        setTeamRosters(data.teams || {});
        setApiTransfers(data.transfers || {});
        setTakenNames(data.taken || []);
      }
    } catch (e) {}
  }, []);
  useEffect(() => { fetchRosters(); }, [fetchRosters]);

  // Merge Redis rosters into TEAMS
  const teamsWithRosters = TEAMS.map(t => ({
    ...t,
    players: (teamRosters[t.id] && teamRosters[t.id].length > 0) ? teamRosters[t.id] : t.players,
  }));

  function teamsOwning(apiName) {
    const out = [];
    for (const t of teamsWithRosters) {
      if (t.players.some(p => nameMatches(p.name, apiName))) out.push(t.name);
    }
    return out;
  }

  const findScore = useCallback((ourName) => {
    if (players[ourName]) return players[ourName];
    const norm = normalize(ourName);
    for (const [k, v] of Object.entries(players)) {
      if (normalize(k) === norm) return v;
      // Last name match
      const kLast = normalize(k).split(" ").pop();
      const ourLast = norm.split(" ").pop();
      if (kLast === ourLast && normalize(k)[0] === norm[0]) return v;
    }
    return null;
  }, [players]);

  const doFetch = useCallback(async () => {
    setStatus("fetching");
    try {
      const res = await fetch("/api/scores");
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error + ": " + (data.details||[]).join(", "));
      const map = {};
      for (const p of data.players) { map[p.name] = p; }
      setPlayers(map);
      setLastUpdated(new Date());
      setStatus("success");
      setMsg(data.status === "not-started" ? "Tournament not started" : `${data.playerCount} players via ${data.source}`);
    } catch (e) {
      setStatus("error");
      setMsg(e.message);
    }
  }, []);

  useEffect(() => {
    if (autoPoll) {
      doFetch();
      intervalRef.current = setInterval(doFetch, POLL_MS);
      return () => clearInterval(intervalRef.current);
    } else {
      if (intervalRef.current) clearInterval(intervalRef.current);
    }
  }, [autoPoll, doFetch]);

  const gTot = (name) => findScore(name)?.total ?? null;
  const gThru = (name) => findScore(name)?.thru ?? null;

  // Derive corrected round scores — if total != sum of rounds, fix the latest round
  const correctedRounds = (s) => {
    if (!s) return { r1: null, r2: null, r3: null, r4: null };
    const rounds = { r1: s.r1, r2: s.r2, r3: s.r3, r4: s.r4 };
    if (s.total == null) return rounds;
    const keys = ["r1", "r2", "r3", "r4"];
    const nonNull = keys.filter(k => rounds[k] != null);
    if (nonNull.length === 0) return rounds;
    const sum = nonNull.reduce((a, k) => a + rounds[k], 0);
    if (sum !== s.total) {
      // Fix the latest round with data
      const lastKey = nonNull[nonNull.length - 1];
      rounds[lastKey] = s.total - (sum - rounds[lastKey]);
    }
    return rounds;
  };

  // Cut line: top 60 and ties
  const allPlayers = Object.values(players);
  // R2 is over when every player has r2 data AND no one is still mid-round in R2
  const r2Done = allPlayers.length > 0 && allPlayers.every(p => p.r2 != null) && allPlayers.every(p => {
    if (p.r3 != null) return true; // already in R3, clearly past R2
    const t = parseInt(p.thru);
    return isNaN(t) || t >= 18; // not mid-round
  });
  // Cut is a 36-hole cut — always compute from R1+R2 only, never from live total
  const r1r2Score = (p) => (p.r1 != null && p.r2 != null) ? p.r1 + p.r2 : null;
  const playersWithR1R2 = allPlayers.filter(p => r1r2Score(p) != null).sort((a, b) => r1r2Score(a) - r1r2Score(b));
  const projectedCutScore = playersWithR1R2.length >= 60 ? r1r2Score(playersWithR1R2[59]) : null;
  const actualCutScore = r2Done ? projectedCutScore : null;
  // MC penalty only applies after R2 is complete
  const isMC = (name) => {
    if (actualCutScore === null) return false;
    const s = findScore(name);
    if (!s) return false;
    const sc36 = r1r2Score(s);
    if (sc36 == null) return false;
    return sc36 > actualCutScore;
  };

  // Worst round score among all active players (for missed-cut penalty)
  const worstRound = (rKey) => {
    let worst = null;
    for (const p of Object.values(players)) {
      const v = p[rKey];
      if (v != null && (worst === null || v > worst)) worst = v;
    }
    return worst;
  };

  // Build effective roster with roles
  // Transfer source: Redis-backed apiTransfers (only populated after the swap
  // window closes at first R3 tee time) with a fallback to the hardcoded
  // TRANSFERS const for NPC/historic teams.
  const buildRoster = (team) => {
    const tx = apiTransfers[team.id] || TRANSFERS.find(t => t.teamId === team.id);
    return team.players.map(p => {
      if (tx && nameMatches(p.name, tx.out)) return { ...p, role: "swapped-out" };
      if (isMC(p.name) && !tx?.out) return { ...p, role: "mc" };
      if (tx && isMC(p.name) && !nameMatches(p.name, tx.out)) return { ...p, role: "mc" };
      return { ...p, role: "original" };
    }).concat(tx ? [{ name: tx.in, cost: tx.inCost, role: "swapped-in" }] : []);
  };

  // Player's scoring contribution based on role
  const playerContribution = (name, role) => {
    const s = findScore(name);
    if (!s) return null;
    if (role === "original") return s.total ?? null;
    if (role === "swapped-out") {
      const r1 = s.r1, r2 = s.r2;
      if (r1 == null && r2 == null) return null;
      return (r1 ?? 0) + (r2 ?? 0);
    }
    if (role === "swapped-in") {
      const r3 = s.r3, r4 = s.r4;
      if (r3 == null && r4 == null) return null;
      return (r3 ?? 0) + (r4 ?? 0);
    }
    if (role === "mc") {
      const r1 = s.r1, r2 = s.r2;
      const base = (r1 == null && r2 == null) ? null : (r1 ?? 0) + (r2 ?? 0);
      const wr3 = worstRound("r3"), wr4 = worstRound("r4");
      const penalty = (wr3 ?? 0) + (wr4 ?? 0);
      if (base == null && wr3 == null && wr4 == null) return null;
      return (base ?? 0) + penalty;
    }
    return s.total ?? null;
  };

  // Team total using effective roster
  const tTot = (team) => {
    const roster = team.players[0]?.role ? team.players : buildRoster(team);
    let t = 0, h = false;
    for (const p of roster) {
      const c = playerContribution(p.name, p.role || "original");
      if (c !== null) { t += c; h = true; }
    }
    return h ? t : null;
  };

  const sortedPlayerScores = (team) => {
    const roster = team.players[0]?.role ? team.players : buildRoster(team);
    return roster.filter(p => p.role !== "swapped-out").map(p => playerContribution(p.name, p.role || "original") ?? Infinity).sort((a, b) => a - b);
  };

  const ranked = [...teamsWithRosters].map(t => {
    const roster = buildRoster(t);
    return { ...t, roster, players: roster, total: null };
  }).map(t => ({ ...t, total: tTot(t) })).sort((a, b) => {
    if (a.total === null && b.total === null) return a.id - b.id;
    if (a.total === null) return 1; if (b.total === null) return -1;
    if (a.total !== b.total) return a.total - b.total;
    const as = sortedPlayerScores(a), bs = sortedPlayerScores(b);
    for (let i = 0; i < as.length; i++) { if (as[i] !== bs[i]) return as[i] - bs[i]; }
    return a.id - b.id;
  });

  const fmt=(n)=>{if(n===null||n===undefined)return"–";if(n===0)return"E";return n>0?`+${n}`:`${n}`;};
  const sc=(n)=>{if(n===null)return"#999";if(n<0)return"#c0392b";if(n===0)return"#555";return"#2c3e50";};
  const lv = ranked[0]?.total;
  const lastVal = [...ranked].reverse().find(t=>t.total!==null)?.total;

  const rankedNpc = [...NPC_TEAMS].map(t=>{
    const roster = buildRoster(t);
    return { ...t, roster, players: roster, total: null };
  }).map(t=>({...t,total:tTot(t)})).sort((a,b)=>{
    if(a.total===null&&b.total===null) return 0;
    if(a.total===null) return 1; if(b.total===null) return -1;
    if(a.total!==b.total) return a.total-b.total;
    const as=sortedPlayerScores(a), bs=sortedPlayerScores(b);
    for(let i=0;i<as.length;i++){ if(as[i]!==bs[i]) return as[i]-bs[i]; }
    return 0;
  });

  const fieldPlayers = Object.values(players).map(p=>({
    ...p,
    tier: getTier(p.name),
    owners: teamsOwning(p.name),
    cut: projectedCutScore !== null && r1r2Score(p) != null && r1r2Score(p) > projectedCutScore,
  })).sort((a,b)=>{
    if(a.cut!==b.cut) return a.cut?1:-1;
    if(a.total===null&&b.total===null) return a.name.localeCompare(b.name);
    if(a.total===null) return 1;
    if(b.total===null) return -1;
    return a.total-b.total;
  });
  const cutIndex = fieldPlayers.findIndex(p=>p.cut);

  // --- Team Picker helpers ---
  const allFieldPlayers = [4,3,2,1].flatMap(tier =>
    PRICE_TIERS[tier].map(name => ({ name, cost: tier }))
  );

  const pickBudget = pickPlayers.reduce((s, p) => s + p.cost, 0);
  const pickTier4 = pickPlayers.filter(p => p.cost === 4).length;
  const pickTier3 = pickPlayers.filter(p => p.cost === 3).length;
  const pickValid = pickPlayers.length === 4 && pickBudget <= 10 && pickTier4 <= 1 && pickTier3 <= 2;

  // Draft format: a player on another team is off the board. Build the set of
  // names this team already owns (its saved roster with any pending swap applied)
  // so we never grey out the participant's own players.
  const takenSet = new Set(takenNames);
  const myOwnNorm = (() => {
    const s = new Set(pickOriginalRoster.map(p => normalize(p.name)));
    if (pickPendingTransfer) {
      s.delete(normalize(pickPendingTransfer.out));
      s.add(normalize(pickPendingTransfer.in));
    }
    return s;
  })();
  const isTakenByOther = (name) => {
    const n = normalize(name);
    return takenSet.has(n) && !myOwnNorm.has(n);
  };

  const togglePlayer = (name, cost) => {
    setPickError("");
    const exists = pickPlayers.find(p => p.name === name);
    if (exists) {
      setPickPlayers(pickPlayers.filter(p => p.name !== name));
    } else {
      if (isTakenByOther(name)) {
        setPickError(`${name} is already on another team — pick someone else.`);
        return;
      }
      if (pickPlayers.length >= 4) return;
      setPickPlayers([...pickPlayers, { name, cost }]);
    }
  };

  const openPicker = () => {
    setPickOpen(true);
    setPickStep("pin");
    setPickTeamId(null);
    setPickPin("");
    setPickPlayers([]);
    setPickOriginalRoster([]);
    setPickPendingTransfer(null);
    setPickError("");
    setPickSaving(false);
  };

  const submitPin = async () => {
    setPickError("");
    try {
      const res = await fetch("/api/pin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pin: pickPin }),
      });
      const data = await res.json();
      if (data.status === "verified") {
        setPickTeamId(data.teamId);
        setPickStep("edit");
        const original = (data.roster && data.roster.length > 0) ? data.roster : (teamRosters[data.teamId] || []);
        setPickOriginalRoster(original);
        setPickPendingTransfer(data.transfer || null);
        // Show the EFFECTIVE roster (original with any pending swap applied) so the
        // participant can keep swapping or revert.
        let effective = original;
        if (data.transfer && original.length > 0) {
          effective = original.map(p => nameMatches(p.name, data.transfer.out)
            ? { name: data.transfer.in, cost: data.transfer.inCost }
            : p);
        }
        if (effective.length > 0) setPickPlayers(effective);
      } else {
        setPickError("Invalid PIN.");
      }
    } catch (e) {
      setPickError("Network error");
    }
  };

  const submitTeam = async () => {
    setPickError("");
    if (!pickValid) {
      setPickError("Team doesn't meet the rules — check constraints above.");
      return;
    }
    setPickSaving(true);
    try {
      const res = await fetch("/api/teams", {
        method: "POST",
        headers: { "Content-Type": "application/json" },

                        return(
                          <span key={i} style={{fontSize:11,background:isOut?"#ddd":"#f0ece2",padding:"2px 8px",borderRadius:12,display:"inline-flex",alignItems:"center",gap:4,alignSelf:"flex-start",opacity:isOut?.55:1}}>
                            <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:16,height:16,borderRadius:"50%",background:costBg[p.cost],color:"#fff",fontSize:9,fontWeight:700}}>{p.cost}</span>
                            <span style={{textDecoration:isOut?"line-through":"none"}}>{p.name}</span>
                            {isIn&&<span style={{fontSize:9,fontWeight:700,color:"#15803d",marginLeft:2}}>↑IN</span>}
                            {isMc&&<span style={{fontSize:9,fontWeight:700,color:"#dc2626",marginLeft:2}}>MC</span>}
                            <span style={{fontWeight:700,color:sc(contrib),fontSize:10}}>{fmt(contrib)}</span>
                            {!isOut&&thru&&<span style={{fontSize:9,color:"#999"}}>({thru==="18"||thru==="F"?"F":thru})</span>}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                  <div style={{fontSize:24,fontWeight:800,color:sc(team.total),fontVariantNumeric:"tabular-nums"}}>{fmt(team.total)}</div>
                </div>
                {open&&(
                  <div style={{borderTop:"1px solid #eee",background:"#fafaf5",overflowX:"auto"}} onClick={e=>e.stopPropagation()}>
                   <div style={{padding:"12px 16px",minWidth:480}}>
                    <div style={{display:"grid",gridTemplateColumns:"minmax(140px,1fr) 44px repeat(4,42px) 48px 48px",gap:4,fontSize:10,fontWeight:700,color:"#888",letterSpacing:1,marginBottom:6,paddingLeft:28}}>
                      <span/><span style={{textAlign:"center"}}>{team.detailLabel}</span>{[1,2,3,4].map(r=><span key={r} style={{textAlign:"center"}}>R{r}</span>)}<span style={{textAlign:"center"}}>TOT</span><span style={{textAlign:"center"}}>THRU</span>
                    </div>
                    {team.players.map((p,i)=>{
                      const s=findScore(p.name)||{};const cr=correctedRounds(findScore(p.name));const thru=gThru(p.name);
                      const isOut=p.role==="swapped-out", isIn=p.role==="swapped-in", isMc=p.role==="mc";
                      const contrib=playerContribution(p.name, p.role||"original");
                      const showDivider=isIn;
                      return(
                        <React.Fragment key={i}>
                        {showDivider&&<div style={{gridColumn:"1/-1",borderTop:"2px dashed #cc0000",margin:"4px 0 2px 28px"}}/>}
                        <div style={{display:"grid",gridTemplateColumns:"minmax(140px,1fr) 44px repeat(4,42px) 48px 48px",gap:4,alignItems:"center",padding:"6px 0 6px 28px",borderBottom:!isIn&&i<team.players.length-1?"1px solid #eee":"none"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:20,height:20,borderRadius:"50%",background:costBg[p.cost],color:"#fff",fontSize:10,fontWeight:700,opacity:isOut?.5:1}}>{p.cost}</span>
                            <div>
                              <span style={{fontSize:13,fontWeight:600,textDecoration:isOut?"line-through":"none",opacity:isOut?.5:1}}>{p.name}</span>
                              {isIn&&<span style={{fontSize:9,fontWeight:700,color:"#15803d",marginLeft:4}}>↑IN</span>}
                              {isMc&&<span style={{fontSize:9,fontWeight:700,color:"#dc2626",marginLeft:4}}>MC</span>}
                              {isMc&&<div style={{fontSize:10,color:"#ea580c",fontStyle:"italic",marginTop:1}}>R3/R4 = worst active round score</div>}
                            </div>
                          </div>
                          <span style={{textAlign:"center",fontSize:12,fontWeight:700,color:"#8b7355"}}>{p.detail||""}</span>
                          {["r1","r2","r3","r4"].map(r=>{
                            const grayOut=(isOut&&(r==="r3"||r==="r4"))||(isIn&&(r==="r1"||r==="r2"));
                            const isPenalty=isMc&&(r==="r3"||r==="r4");
                            const v=isPenalty?worstRound(r):(grayOut?null:cr[r]);
                            return<span key={r} style={{textAlign:"center",fontSize:13,fontWeight:600,color:grayOut?"#ccc":isPenalty?"#ea580c":sc(v??null),fontStyle:isPenalty?"italic":"normal"}}>{grayOut?"✕":fmt(v??null)}</span>;
                          })}
                          <span style={{textAlign:"center",fontSize:14,fontWeight:800,color:sc(contrib)}}>{fmt(contrib)}</span>
                          <span style={{textAlign:"center",fontSize:12,color:"#888"}}>{isOut?"":thru||"–"}</span>
                        </div>
                        </React.Fragment>
                      );
                    })}
                   </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </section>
      )}

      {/* Team Picker Modal */}
      {pickOpen && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setPickOpen(false)}>
          <div style={{background:"#fff",borderRadius:12,maxWidth:480,width:"100%",maxHeight:"90vh",overflow:"auto",boxShadow:"0 10px 40px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:"20px 24px",borderBottom:"1px solid #eee",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#00205b",margin:0}}>
                {pickStep==="pin"?"Enter PIN":`${TEAMS.find(t=>t.id===pickTeamId)?.name} — ${editingStatus().mode==="swap"?"Transfer":(pickPlayers.length>0?"Edit Roster":"Build Roster")}`}
              </h2>
              <button onClick={()=>setPickOpen(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#999",lineHeight:1}}>×</button>
            </div>

            <div style={{padding:"20px 24px"}}>
              {/* Step 1: PIN entry */}
              {pickStep==="pin" && (
                <div>
                  <div style={{fontSize:12,color:"#999",marginBottom:16}}>
                    Enter the 4-digit PIN you were given. You can come back here to edit your team any time until the first tee time.
                  </div>
                  <input type="password" inputMode="numeric" maxLength={4} placeholder="PIN" value={pickPin}
                    onChange={e=>setPickPin(e.target.value.replace(/\D/g,"").slice(0,4))}
                    onKeyDown={e=>{if(e.key==="Enter"&&pickPin.length===4)submitPin();}}
                    style={{width:"100%",padding:"12px 16px",fontSize:24,fontWeight:700,textAlign:"center",letterSpacing:12,border:"2px solid #e8e4da",borderRadius:8,fontFamily:"'DM Sans',sans-serif",outline:"none"}}
                    autoFocus
                  />
                  {pickError && <div style={{color:"#dc2626",fontSize:12,marginTop:8}}>{pickError}</div>}
                  <div style={{marginTop:16}}>
                    <button onClick={submitPin} disabled={pickPin.length!==4}
                      style={{width:"100%",padding:"12px",background:pickPin.length===4?"#00205b":"#ccc",color:"#fff",border:"none",borderRadius:6,cursor:pickPin.length===4?"pointer":"default",fontSize:14,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>Continue</button>
                  </div>
                </div>
              )}

              {/* Step 2: Team editor */}
              {pickStep==="edit" && (
                <div>
                  {/* Transfer-window guidance — only during swap mode */}
                  {editingStatus().mode==="swap" && (
                    <div style={{marginBottom:16,padding:"12px 14px",background:"#eef2f9",border:"1px solid #cdd9ec",borderRadius:8,fontSize:12,lineHeight:1.5,color:"#334155"}}>
                      <div style={{fontWeight:700,letterSpacing:1,fontSize:11,color:"#00205b",marginBottom:6}}>TRANSFER WINDOW</div>
                      You may swap <strong>exactly one</strong> player for another of <strong>equal or lower value</strong> who is <strong>not already on another team</strong>. The dropped player keeps their R1/R2 score; the new player only contributes R3/R4.
                      {pickPendingTransfer && (
                        <div style={{marginTop:8,paddingTop:8,borderTop:"1px dashed #cdd9ec"}}>
                          <strong>Your current swap:</strong> {pickPendingTransfer.out} (£{pickPendingTransfer.outCost}m) → {pickPendingTransfer.in} (£{pickPendingTransfer.inCost}m). Re-submit your original 4 to revert, or change the swap below.
                        </div>
                      )}
                    </div>
                  )}
                  {/* Constraint tracker */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16,padding:"12px",background:"#f8f6f0",borderRadius:8,fontSize:12,textAlign:"center"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:18,color:pickPlayers.length===4?"#15803d":pickPlayers.length>4?"#dc2626":"#00205b"}}>{pickPlayers.length}/4</div>
                      <div style={{color:"#888",marginTop:2}}>Players</div>
                    </div>
                    <div>
                      <div style={{fontWeight:700,fontSize:18,color:pickBudget>10?"#dc2626":pickBudget===10?"#15803d":"#00205b"}}>£{pickBudget}m</div>
                      <div style={{color:"#888",marginTop:2}}>of £10m</div>
                    </div>
                    <div>
                      <div style={{fontWeight:700,fontSize:18,color:pickTier4>1?"#dc2626":"#00205b"}}>{pickTier4}/1</div>
                      <div style={{color:"#888",marginTop:2}}>£4m max</div>
                    </div>
                    <div>
                      <div style={{fontWeight:700,fontSize:18,color:pickTier3>2?"#dc2626":"#00205b"}}>{pickTier3}/2</div>
                      <div style={{color:"#888",marginTop:2}}>£3m max</div>
                    </div>
                  </div>

                  {/* Currently selected — tap to remove */}
                  {pickPlayers.length>0 && (
                    <div style={{marginBottom:16,padding:"12px",background:"#eef2f9",border:"1px solid #cdd9ec",borderRadius:8}}>
                      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:"#666",marginBottom:8}}>YOUR TEAM — TAP TO REMOVE</div>
                      <div style={{display:"flex",flexDirection:"column",gap:4}}>
                        {rosterDisplayOrder(pickPlayers).map(p=>(
                          <button key={p.name} onClick={()=>togglePlayer(p.name,p.cost)}
                            style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:"#00205b",color:"#fff",border:"1px solid #00205b",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700}}>
                            <span>✕ {p.name}</span>
                            <span style={{fontSize:11,fontWeight:700,color:"#ff6b6b"}}>£{p.cost}m</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Draft-format notice */}
                  <div style={{marginBottom:12,padding:"10px 12px",background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,fontSize:11.5,lineHeight:1.5,color:"#7c2d12"}}>
                    <strong>Draft format:</strong> every golfer can be on only one team. Players already taken by another team are greyed out and locked.
                  </div>

                  {/* Player list by tier */}
                  {allFieldPlayers.length===0 ? (
                    <div style={{padding:"24px 12px",textAlign:"center",fontSize:12,color:"#999",fontStyle:"italic"}}>The US Open field hasn't been announced yet — player tiers will appear here once they're set.</div>
                  ) : [4,3,2,1].map(tier=>(
                    <div key={tier} style={{marginBottom:12}}>
                      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:"#888",marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                        <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:18,height:18,borderRadius:"50%",background:costBg[tier],color:"#fff",fontSize:9,fontWeight:700}}>£{tier}</span>
                        {tier===4?"PREMIUM":tier===3?"ELITE":tier===2?"MID-RANGE":"VALUE"}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:4}}>
                        {PRICE_TIERS[tier].map((name,i)=>{
                          const selected=pickPlayers.some(p=>p.name===name);
                          const taken=!selected&&isTakenByOther(name);
                          const disabled=taken||(!selected&&pickPlayers.length>=4);
                          return(
                            <button key={name} onClick={()=>!disabled&&togglePlayer(name,tier)}
                              style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:selected?"#00205b":"#fff",color:selected?"#fff":taken?"#999":"#333",border:selected?"1px solid #00205b":"1px solid #e8e4da",borderRadius:8,cursor:disabled?"default":"pointer",opacity:disabled?.45:1,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:selected?700:500,transition:"all .15s"}}>
                              <span style={{display:"flex",alignItems:"center",gap:8}}>
                                <span style={{fontSize:10,fontWeight:700,color:selected?"#ff6b6b":"#bbb",minWidth:18}}>{i+1}.</span>
                                <span style={{textDecoration:taken?"line-through":"none"}}>{name}</span>
                              </span>
                              {taken
                                ? <span style={{fontSize:9,fontWeight:700,letterSpacing:1,color:"#999",background:"#f0ece2",border:"1px solid #e0d9c8",padding:"2px 6px",borderRadius:10}}>TAKEN</span>
                                : <span style={{fontSize:11,fontWeight:700,color:selected?"#ff6b6b":"#888"}}>£{tier}m</span>}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}

                  {pickError && <div style={{color:"#dc2626",fontSize:12,marginBottom:8}}>{pickError}</div>}
                  <div style={{display:"flex",gap:8,marginTop:8,position:"sticky",bottom:0,background:"#fff",padding:"12px 0"}}>
                    <button onClick={()=>setPickOpen(false)}
                      style={{flex:1,padding:"12px",background:"#f0ece2",border:"1px solid #e8e4da",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",color:"#555"}}>Cancel</button>
                    <button onClick={submitTeam} disabled={!pickValid||pickSaving}
                      style={{flex:2,padding:"12px",background:pickValid?"#00205b":"#ccc",color:"#fff",border:"none",borderRadius:6,cursor:pickValid?"pointer":"default",fontSize:14,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>{pickSaving?"Saving…":(editingStatus().mode==="swap"?"Save Swap":"Save Team")}</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <footer style={{textAlign:"center",padding:"20px 16px 28px",fontSize:11,color:"#bbb",letterSpacing:2,fontStyle:"italic"}}>A tradition unlike any other™</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
